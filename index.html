<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Ideals | The Green Knowledge Portal</title>
    <style>
        /* CSS resets */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Georgia', serif; overflow: hidden; color: white; }

        /* Background Video Styling */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(60%);
        }

        /* Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* NK Logo */
        .logo-nk {
            background: linear-gradient(135deg, #2E7D32, #1B5E20);
            color: white;
            font-size: 30px;
            font-weight: bold;
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            border: 3px solid #A5D6A7;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(165, 214, 167, 0.5);
        }

        h1 {
            font-size: 60px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
            animation: fadeInDown 1.5s ease;
        }

        p {
            font-size: 22px;
            max-width: 800px;
            margin-bottom: 40px;
            font-weight: 300;
            animation: fadeInUp 1.5s ease;
        }

        /* Professional Navigation Buttons */
        .nav-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .main-btn {
            padding: 15px 35px;
            font-size: 18px;
            background: transparent;
            color: white;
            border: 2px solid #A5D6A7;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.4s ease;
            border-radius: 5px;
        }

        .main-btn:hover {
            background-color: #A5D6A7;
            color: #1B5E20;
            box-shadow: 0 0 15px rgba(165, 214, 167, 0.7);
        }

        .kids-btn {
            background-color: #FFD54F; /* Bright yellow for kids */
            color: #333;
            border: 2px solid #FFD54F;
        }

        .kids-btn:hover {
            background-color: white;
            color: #FF8F00;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-sunlight-through-the-trees-of-a-forest-431-large.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <div class="logo-nk">NK</div>

        <h1>NATURE IDEALS</h1>
        <p>A Global Sanctuary of Knowledge. Explore the world's most magnificent forests, learn how to protect our planet, and enter a dedicated space for the conservationists of tomorrow.</p>

        <div class="nav-container">
            <a href="forests.html" class="main-btn">The Great Forests</a>
            <a href="protection.html" class="main-btn">Protection & Future</a>
            <a href="quiz.html" class="main-btn">Global Quiz</a>
            <a href="kids.html" class="main-btn kids-btn">🌿 Kids Space 🧸</a>
        </div>
    </div>

</body>
</html>
